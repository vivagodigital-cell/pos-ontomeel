<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontomeel | Explore the World of Knowledge</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #ffffff;
            --text: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        nav { padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .hero { padding: 5rem 5%; text-align: center; background: linear-gradient(to bottom, #f8fafc, #ffffff); }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.25rem; color: #64748b; max-width: 600px; margin: 0 auto 2rem; }
        .btn { background: var(--primary); color: white; padding: 1rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 800; font-size: 1.5rem;">ONTOMEEL</div>
        <div style="display: flex; gap: 2rem;">
            <a href="#">Contact</a>
            <a href="#">Login</a>
            <a href="#" class="btn" style="padding: 0.5rem 1rem;">Join Now</a>
        </div>
    </nav>
    <section class="hero">
        <h1>Your Gateway to <span style="color: var(--primary);">Knowledge</span></h1>
        <p>Borrow, buy, and explore thousands of books from our curated collection. Manage your library experience with ease.</p>
        <a href="#" class="btn">Explore Collection</a>
    </section>
</body>
</html>
