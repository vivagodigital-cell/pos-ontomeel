<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Terminal | Ontomeel Library</title>
    <link rel="stylesheet" href="../assets/pos-styles.css?v=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .terminal-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 1.5rem;
            height: calc(100vh - 140px);
            margin-top: 1rem;
        }

        /* Left side: Books Explorer */
        .explorer-pane {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .pane-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        .browse-grid {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.25rem;
            align-content: start;
        }

        .book-pill {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 0.75rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .book-pill:hover {
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .book-thumbnail {
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 6px;
            background: var(--primary-blue-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .book-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-info-compact {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .book-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-header);
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2; /* Standard property for compatibility */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-price-tag {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin-top: 4px;
        }

        .stock-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 800;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }

        /* Right side: Modern Cart */
        .cart-pane {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .member-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            box-shadow: var(--shadow-sm);
        }

        .pos-cart {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .cart-list {
            flex-grow: 1;
            padding: 1rem;
            overflow-y: auto;
        }

        .cart-row {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .cart-row:last-child { border-bottom: none; }

        .cart-img {
            width: 45px;
            height: 60px;
            border-radius: 4px;
            background: var(--primary-blue-soft);
            object-fit: cover;
        }

        .cart-details {
            flex-grow: 1;
        }

        .cart-total-sect {
            background: var(--bg-main);
            padding: 1.5rem;
            border-top: 1px solid var(--border-light);
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 1.25rem;
        }

        .btn-action {
            padding: 0.875rem;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-sell { background: var(--primary-blue); color: white; }
        .btn-issue { background: var(--accent-mint); color: white; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Skeleton Loading Effect */
        .skeleton {
            background: linear-gradient(90deg, #f0f2f5 25%, #e6e8eb 50%, #f0f2f5 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite linear;
            border-radius: 4px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-thumb { width: 100%; aspect-ratio: 3/4; margin-bottom: 8px; }
        .skeleton-text { height: 14px; width: 80%; margin-bottom: 6px; }
        .skeleton-text.short { width: 40%; }

        /* Fade-in Animation */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-wrapper">
            <div class="logo-icon"><i class="fa-solid fa-book-open"></i></div>
            <span class="logo-text">ONTOMEEL</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item"><a href="../index.html" class="nav-link"><i class="fa-solid fa-house"></i><span class="nav-text">Dashboard</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link active"><i class="fa-solid fa-cash-register"></i><span class="nav-text">Terminal</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-book"></i><span class="nav-text">Inventory</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-users"></i><span class="nav-text">Members</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i><span class="nav-text">Borrows</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-chart-line"></i><span class="nav-text">Reports</span></a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <header>
            <div class="page-title">
                <h1>Sales Terminal</h1>
                <p>Quick issue and billing system</p>
            </div>
            <div class="header-tools">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="bookSearch" placeholder="Search by title, author or ISBN..." onkeyup="filterBooks()">
                </div>
            </div>
        </header>

        <div class="terminal-layout">
            <!-- Explorer -->
            <div class="explorer-pane">
                <div class="pane-header">
                    <div style="font-weight: 700; color: var(--text-header);">Library Catalog</div>
                    <div id="bookCount" style="font-size: 0.8rem; color: var(--text-muted);">Loading books...</div>
                </div>
                <div class="browse-grid" id="browseGrid">
                    <!-- Dynamic Content -->
                </div>
            </div>

            <!-- Cart -->
            <div class="cart-pane">
                <div class="member-card">
                    <div style="font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px;">Customer Details</div>
                    <div class="search-box" style="width: 100%; padding: 0.6rem 1rem;">
                        <i class="fa-solid fa-user-tag" style="color: var(--primary-blue);"></i>
                        <input type="text" placeholder="Scan Member ID or Search..." style="font-size: 0.85rem;">
                    </div>
                </div>

                <div class="pos-cart">
                    <div style="padding: 1.25rem; border-bottom: 1px solid var(--border-light); font-weight: 700;">Items in Cart</div>
                    <div class="cart-list" id="cartList">
                        <div style="text-align: center; color: var(--text-muted); margin-top: 3rem;">
                            <i class="fa-solid fa-basket-shopping" style="font-size: 2.5rem; opacity: 0.1; display: block; margin-bottom: 1rem;"></i>
                            No books selected
                        </div>
                    </div>
                    <div class="cart-total-sect">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem;">
                            <span style="color: var(--text-muted);">Selected Items</span>
                            <span id="cartCount" style="font-weight: 700;">0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 800; color: var(--text-header); margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-light);">
                            <span>Total</span>
                            <span id="cartTotal">৳0.00</span>
                        </div>

                        <div class="action-btns">
                            <button class="btn-action btn-issue" onclick="finalize('issue')"><i class="fa-solid fa-hand-holding"></i> ISSUE</button>
                            <button class="btn-action btn-sell" onclick="finalize('sell')"><i class="fa-solid fa-receipt"></i> SELL</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allBooks = [];
        let cart = [];

        async function init() {
            renderSkeletons();
            
            try {
                // Resilient path for production API
                const apiPath = '../../api/controllers/TerminalController.php?action=getBooks';
                
                const response = await fetch(apiPath);
                if (!response.ok) throw new Error('Network response was not ok');
                allBooks = await response.json();
                
                // Forced 0.3s delay for the skeleton effect appreciation
                setTimeout(() => {
                    renderBooks(allBooks);
                    document.getElementById('bookCount').innerText = `${allBooks.length} Books Available`;
                }, 300);

            } catch (error) {
                console.error('Init error:', error);
                document.getElementById('bookCount').innerText = "Error loading books.";
            }
        }

        function renderSkeletons() {
            const grid = document.getElementById('browseGrid');
            grid.innerHTML = '';
            // Show 12 skeleton cards
            for (let i = 0; i < 12; i++) {
                const card = document.createElement('div');
                card.className = 'book-pill';
                card.innerHTML = `
                    <div class="skeleton skeleton-thumb"></div>
                    <div class="book-info-compact">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function renderBooks(books) {
            const grid = document.getElementById('browseGrid');
            grid.innerHTML = '';
            
            // Image base path: Going out of /pos/pages/ and /ontomeel-pos/ to reach /admin/
            const imageBasePath = '../../../admin/assets/book-images/';
            
            books.forEach(book => {
                const pill = document.createElement('div');
                pill.className = 'book-pill fade-in';
                pill.onclick = () => addToCart(book);
                
                // Determine image source
                let imgSrc = '';
                if (book.cover_image) {
                    if (book.cover_image.startsWith('http')) {
                        imgSrc = book.cover_image;
                    } else {
                        imgSrc = imageBasePath + book.cover_image;
                    }
                }

                pill.innerHTML = `
                    <div class="stock-badge" style="color: ${book.stock_qty > 5 ? 'var(--accent-mint)' : '#ef4444'}">${book.stock_qty} in stock</div>
                    <div class="book-thumbnail">
                        ${imgSrc 
                            ? `<img src="${imgSrc}" loading="lazy" alt="${book.title}" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(book.title)}&background=eff6ff&color=2563eb&bold=true'">` 
                            : '<i class="fa-solid fa-book-open" style="font-size: 2rem; color: #cbd5e1;"></i>'}
                    </div>
                    <div class="book-info-compact">
                        <div class="book-name">${book.title}</div>
                        <div class="book-meta">${book.author}</div>
                        <div class="book-price-tag">৳${parseFloat(book.sell_price).toFixed(2)}</div>
                    </div>
                `;
                grid.appendChild(pill);
            });
        }

        function filterBooks() {
            const query = document.getElementById('bookSearch').value.toLowerCase();
            const filtered = allBooks.filter(b => 
                b.title.toLowerCase().includes(query) || 
                b.author.toLowerCase().includes(query)
            );
            renderBooks(filtered);
        }

        function addToCart(book) {
            cart.push(book);
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartList');
            const totalEl = document.getElementById('cartTotal');
            const countEl = document.getElementById('cartCount');
            
            if (cart.length === 0) {
                list.innerHTML = `<div style="text-align: center; color: var(--text-muted); margin-top: 3rem;"><i class="fa-solid fa-basket-shopping" style="font-size: 2.5rem; opacity: 0.1; display: block; margin-bottom: 1rem;"></i>No books selected</div>`;
                totalEl.innerText = '৳0.00';
                countEl.innerText = '0';
                return;
            }

            list.innerHTML = '';
            let total = 0;
            
            cart.forEach((item, index) => {
                total += parseFloat(item.sell_price);
                const row = document.createElement('div');
                row.className = 'cart-row';
                row.innerHTML = `
                    <div class="cart-img" style="background-image: url('${item.cover_image}'); background-size: cover;">
                        ${!item.cover_image ? '<i class="fa-solid fa-book" style="margin: 10px; color: #cbd5e1;"></i>' : ''}
                    </div>
                    <div class="cart-details">
                        <div style="font-size: 0.85rem; font-weight: 700; color: var(--text-header);">${item.title}</div>
                        <div style="font-size: 0.8rem; color: var(--primary-blue); font-weight: 700;">৳${parseFloat(item.sell_price).toFixed(2)}</div>
                    </div>
                    <button onclick="removeFromCart(${index})" style="background: none; border: none; color: #ef4444; cursor: pointer; padding: 5px;"><i class="fa-solid fa-trash-can"></i></button>
                `;
                list.appendChild(row);
            });

            totalEl.innerText = '৳' + total.toFixed(2);
            countEl.innerText = cart.length;
        }

        function finalize(type) {
            if (cart.length === 0) {
                alert('Please add books to the cart first.');
                return;
            }
            alert(`Processing ${type.toUpperCase()} transaction for ${cart.length} items.`);
            // Backend integration would go here
            cart = [];
            updateCartUI();
        }

        window.onload = init;
    </script>
</body>
</html>
