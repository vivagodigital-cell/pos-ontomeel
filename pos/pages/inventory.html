<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Inventory | Ontomeel POS System</title>
    <link rel="stylesheet" href="../assets/pos-styles.css?v=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="../assets/auth-guard.js"></script>
    <style>
        /* ---- Stats Bar ---- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-header);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 3px;
        }

        /* ---- Toolbar ---- */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-input-wrap {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input-wrap input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
        }

        .search-input-wrap input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px #eff6ff;
        }

        .filter-pills {
            display: flex;
            gap: 8px;
        }

        .fpill {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: white;
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .fpill.active,
        .fpill:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        /* ---- Grid ---- */
        .inv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
        }

        /* ---- Cards ---- */
        .inv-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .inv-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: #cbd5e1;
        }

        .card-header {
            padding: 1.25rem 1.25rem 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .type-pill {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .type-Stationary {
            background: #eff6ff;
            color: #2563eb;
        }

        .type-Flowers {
            background: #fdf4ff;
            color: #9333ea;
        }

        .type-Accessories {
            background: #fffbeb;
            color: #d97706;
        }

        .type-General {
            background: #f0fdf4;
            color: #16a34a;
        }

        .type-icon-wrap {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .card-body {
            padding: 1rem 1.25rem 1.25rem;
            flex: 1;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-header);
            margin: 0 0 4px;
            line-height: 1.3;
        }

        .card-sku {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-family: monospace;
            margin-bottom: 1rem;
        }

        .card-footer {
            border-top: 1px solid #f1f5f9;
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stock-chip {
            font-size: 0.78rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .stock-ok {
            background: #f0fdf4;
            color: #16a34a;
        }

        .stock-low {
            background: #fff1f2;
            color: #e11d48;
        }

        .price-tag {
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--primary-blue);
        }

        .card-actions {
            display: flex;
            gap: 6px;
            padding: 0 1.25rem 1rem;
        }

        .card-btn {
            flex: 1;
            padding: 8px;
            border-radius: 10px;
            border: none;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .card-btn.edit {
            background: #eff6ff;
            color: var(--primary-blue);
        }

        .card-btn.edit:hover {
            background: #dbeafe;
        }

        .card-btn.del {
            background: #fff1f2;
            color: #e11d48;
        }

        .card-btn.del:hover {
            background: #ffe4e6;
        }

        .card-btn.stock-btn {
            background: #f0fdf4;
            color: #16a34a;
        }

        .card-btn.stock-btn:hover {
            background: #dcfce7;
        }

        /* ---- Skeleton ---- */
        .skel {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skel-anim 1.4s infinite;
            border-radius: 8px;
        }

        @keyframes skel-anim {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* ---- Add/Edit Modal ---- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-box {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalIn {
            from {
                transform: scale(0.9);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .modal-head h3 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-header);
        }

        .modal-close {
            background: #f1f5f9;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 1.1rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: #e2e8f0;
            color: var(--text-header);
        }

        .form-row {
            display: grid;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row.two {
            grid-template-columns: 1fr 1fr;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-field label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-header);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-field input,
        .form-field select {
            padding: 11px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.2s;
            background: white;
        }

        .form-field input:focus,
        .form-field select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px #eff6ff;
        }

        .btn-save {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            margin-top: 1.25rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-save:hover {
            background: #1d4ed8;
        }

        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ---- Toast ---- */
        #invToast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast-msg {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 0.88rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 260px;
        }

        .toast-msg.success {
            border-left: 4px solid #10b981;
        }

        .toast-msg.error {
            border-left: 4px solid #ef4444;
        }

        .toast-msg.info {
            border-left: 4px solid var(--primary-blue);
        }

        @keyframes toastIn {
            from {
                transform: translateX(100%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        /* ---- Add btn ---- */
        .btn-add {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-add:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

    <nav class="sidebar">
        <div class="logo-wrapper">
            <div class="logo-icon" style="background: none; box-shadow: none;">
                <img src="../assets/logo.webp" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;">
            </div>
            <span class="logo-text">ONTOMEEL</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item"><a href="../index.html" class="nav-link"><i class="fa-solid fa-house"></i><span
                        class="nav-text">Dashboard</span></a></li>
            <li class="nav-item"><a href="terminal.html" class="nav-link"><i class="fa-solid fa-cash-register"></i><span
                        class="nav-text">Terminal</span></a></li>
            <li class="nav-item"><a href="#" class="nav-link active"><i class="fa-solid fa-box-open"></i><span
                        class="nav-text">Inventory</span></a></li>
            <li class="nav-item"><a href="orders.html" class="nav-link"><i class="fa-solid fa-history"></i><span
                        class="nav-text">Orders</span></a></li>
            <li class="nav-item"><a href="member.html" class="nav-link"><i class="fa-solid fa-users"></i><span
                        class="nav-text">Members</span></a></li>
            <li class="nav-item"><a href="supplier.html" class="nav-link"><i
                        class="fa-solid fa-truck-ramp-box"></i><span class="nav-text">Suppliers</span></a></li>
            <li class="nav-item"><a href="report.html" class="nav-link"><i class="fa-solid fa-chart-line"></i><span
                        class="nav-text">Reports</span></a></li>
        </ul>
        <div style="margin-top: auto; padding: 1rem;">
            <a href="javascript:void(0)" onclick="logout()" class="nav-link" style="color: #ef4444;">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="nav-text">Logout</span>
            </a>
        </div>
    </nav>

    <div class="main-wrapper">
        <header>
            <div class="page-title">
                <h1>General <span style="color: var(--primary-blue);">Inventory</span></h1>
                <p>Products, stationary, flowers &amp; more — sold directly from the terminal</p>
            </div>
            <div class="header-tools" style="display: flex; align-items: center; gap: 1rem;">
                <div class="user-profile" style="display: flex; align-items: center; gap: 10px;">
                    <div style="text-align: right;">
                        <div style="font-size: 0.85rem; font-weight: 700; color: var(--text-header);"
                            class="user-name-display">Admin</div>
                        <div
                            style="font-size: 0.7rem; color: var(--accent-mint); font-weight: 800; text-transform: uppercase;">
                            Staff</div>
                    </div>
                </div>
                <button class="btn-add" onclick="openModal()">
                    <i class="fa-solid fa-plus"></i> ADD ITEM
                </button>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-icon" style="background:#eff6ff; color:#2563eb;"><i
                        class="fa-solid fa-boxes-stacked"></i></div>
                <div>
                    <div class="stat-value" id="statTotal">—</div>
                    <div class="stat-label">Total Items</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#f0fdf4; color:#16a34a;"><i
                        class="fa-solid fa-circle-check"></i></div>
                <div>
                    <div class="stat-value" id="statInStock">—</div>
                    <div class="stat-label">In Stock</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fff1f2; color:#e11d48;"><i
                        class="fa-solid fa-triangle-exclamation"></i></div>
                <div>
                    <div class="stat-value" id="statLow">—</div>
                    <div class="stat-label">Low / Out</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fdf4ff; color:#9333ea;"><i class="fa-solid fa-tag"></i></div>
                <div>
                    <div class="stat-value" id="statTypes">—</div>
                    <div class="stat-label">Categories</div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-input-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInv" placeholder="Search items by name or SKU…" oninput="filterItems()">
            </div>
            <div class="filter-pills">
                <button class="fpill active" onclick="setTypeFilter('all', this)">All</button>
                <button class="fpill" onclick="setTypeFilter('Stationary', this)"><i class="fa-solid fa-pen-ruler"
                        style="margin-right:4px;"></i>Stationary</button>
                <button class="fpill" onclick="setTypeFilter('Flowers', this)"><i class="fa-solid fa-seedling"
                        style="margin-right:4px;"></i>Flowers</button>
                <button class="fpill" onclick="setTypeFilter('Accessories', this)"><i class="fa-solid fa-plug"
                        style="margin-right:4px;"></i>Accessories</button>
                <button class="fpill" onclick="setTypeFilter('General', this)"><i class="fa-solid fa-box"
                        style="margin-right:4px;"></i>General</button>
            </div>
        </div>

        <div class="inv-grid" id="inventoryGrid">
            <!-- skeleton placeholders -->
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-box">
            <div class="modal-head">
                <h3 id="modalTitle">Add New Item</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>

            <form id="addItemForm" onsubmit="handleSave(event)">
                <input type="hidden" id="editId" value="">
                <div class="form-row">
                    <div class="form-field">
                        <label>Item Name *</label>
                        <input type="text" id="itemTitle" placeholder="e.g., A4 Paper Rim, Red Roses" required>
                    </div>
                </div>
                <div class="form-row two">
                    <div class="form-field">
                        <label>Item Type *</label>
                        <select id="itemType" required>
                            <option value="Stationary">📐 Stationary</option>
                            <option value="Flowers">🌸 Flowers</option>
                            <option value="Accessories">🔌 Accessories</option>
                            <option value="General">📦 General / Other</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>Sell Price (৳) *</label>
                        <input type="number" id="itemPrice" min="0" step="0.01" value="0" required>
                    </div>
                    <div class="form-field">
                        <label>Cost Price (৳)</label>
                        <input type="number" id="itemCost" min="0" step="0.01" value="0">
                    </div>
                </div>
                <div class="form-row two">
                    <div class="form-field">
                        <label>Stock Quantity</label>
                        <input type="number" id="itemStock" min="0" value="0">
                    </div>
                    <div class="form-field">
                        <label>Barcode / SKU</label>
                        <input type="text" id="itemBarcode" placeholder="Optional">
                    </div>
                </div>
                <button type="submit" class="btn-save" id="btnSaveItem">
                    <i class="fa-solid fa-floppy-disk"></i> SAVE ITEM
                </button>
            </form>
        </div>
    </div>

    <!-- Restock modal -->
    <div class="modal-overlay" id="restockModal">
        <div class="modal-box" style="max-width: 380px;">
            <div class="modal-head">
                <h3>Restock Item</h3>
                <button class="modal-close" onclick="closeRestock()">&times;</button>
            </div>
            <div class="form-field" style="margin-bottom: 1.5rem;">
                <label>Add Stock Units</label>
                <input type="number" id="restockQty" min="1" value="1"
                    style="padding:11px 14px; border:2px solid #e2e8f0; border-radius:12px; font-family:inherit; font-size:0.9rem; transition:0.2s; width:100%;">
            </div>
            <input type="hidden" id="restockId">
            <button onclick="confirmRestock()" class="btn-save"><i class="fa-solid fa-plus"></i> ADD STOCK</button>
        </div>
    </div>

    <div id="invToast"></div>

    <script>
        let allItems = [];
        let activeTypeFilter = 'all';

        const icons = { Stationary: 'pen-ruler', Flowers: 'seedling', Accessories: 'plug', General: 'box' };
        const bgColors = { Stationary: '#eff6ff', Flowers: '#fdf4ff', Accessories: '#fffbeb', General: '#f0fdf4' };
        const iconColors = { Stationary: '#2563eb', Flowers: '#9333ea', Accessories: '#d97706', General: '#16a34a' };

        function toast(msg, type = 'info') {
            const c = document.getElementById('invToast');
            const el = document.createElement('div');
            el.className = `toast-msg ${type}`;
            const icons = { success: 'fa-circle-check', error: 'fa-circle-exclamation', info: 'fa-circle-info' };
            el.innerHTML = `<i class="fa-solid ${icons[type]}"></i> <span>${msg}</span>`;
            c.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = '0.3s'; setTimeout(() => el.remove(), 300); }, 3500);
        }

        function renderSkeletons() {
            const g = document.getElementById('inventoryGrid');
            g.innerHTML = Array.from({ length: 8 }, () => `
                <div class="inv-card" style="padding: 1.25rem;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                        <div class="skel" style="width:46px; height:46px; border-radius:14px;"></div>
                        <div class="skel" style="width:80px; height:22px; border-radius:20px;"></div>
                    </div>
                    <div class="skel" style="width:70%; height:18px; margin-bottom:8px;"></div>
                    <div class="skel" style="width:45%; height:14px; margin-bottom:1.5rem;"></div>
                    <div style="display:flex; justify-content:space-between;">
                        <div class="skel" style="width:70px; height:28px; border-radius:8px;"></div>
                        <div class="skel" style="width:60px; height:24px; border-radius:8px;"></div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats(items) {
            document.getElementById('statTotal').innerText = items.length;
            document.getElementById('statInStock').innerText = items.filter(i => i.stock_qty > 0).length;
            document.getElementById('statLow').innerText = items.filter(i => i.stock_qty <= 5).length;
            document.getElementById('statTypes').innerText = [...new Set(items.map(i => i.item_type))].length;
        }

        function renderItems(items) {
            const g = document.getElementById('inventoryGrid');
            if (items.length === 0) {
                g.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:5rem 2rem; color:var(--text-muted);">
                    <i class="fa-solid fa-box-open" style="font-size:3rem; opacity:0.1; display:block; margin-bottom:1rem;"></i>
                    No items found. Add some to get started!
                </div>`;
                return;
            }
            g.innerHTML = items.map(item => {
                const ico = icons[item.item_type] || 'box';
                const bg = bgColors[item.item_type] || '#f1f5f9';
                const col = iconColors[item.item_type] || '#64748b';
                const isLow = item.stock_qty <= 5;
                return `
                <div class="inv-card">
                    <div class="card-header">
                        <div class="type-icon-wrap" style="background:${bg};">
                            <i class="fa-solid fa-${ico}" style="color:${col};"></i>
                        </div>
                        <span class="type-pill type-${item.item_type}">${item.item_type}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-title">${item.title}</div>
                        <div class="card-sku">${item.isbn ? 'SKU: ' + item.isbn : '<span style="opacity:0.4;">No SKU</span>'}</div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span class="stock-chip ${isLow ? 'stock-low' : 'stock-ok'}">
                                <i class="fa-solid fa-${isLow ? 'triangle-exclamation' : 'circle-check'}" style="margin-right:3px;"></i>
                                ${item.stock_qty} in stock
                            </span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div style="font-size:0.7rem; color:var(--text-muted); font-weight:700; text-transform:uppercase;">Price</div>
                        <div class="price-tag">৳${parseFloat(item.sell_price).toFixed(2)}</div>
                    </div>
                    <div class="card-actions">
                        <button class="card-btn stock-btn" onclick='openRestock(${item.id})'><i class="fa-solid fa-plus"></i> Stock</button>
                        <button class="card-btn edit" onclick='editItem(${JSON.stringify(item).replace(/'/g, "\\'")})'><i class="fa-solid fa-pen"></i> Edit</button>
                        <button class="card-btn del" onclick="deleteItem(${item.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        async function fetchInventory(isSilent = false) {
            if (!isSilent) renderSkeletons();
            try {
                const res = await fetch('../../api/controllers/InventoryController.php?action=getItems');
                const data = await res.json();
                if (data.success) {
                    allItems = data.items;
                    updateStats(allItems);
                    filterItems();
                }
            } catch (e) { if (!isSilent) toast('Failed to load inventory', 'error'); }
        }

        function filterItems() {
            const q = document.getElementById('searchInv').value.toLowerCase().trim();
            let list = allItems;
            if (activeTypeFilter !== 'all') list = list.filter(i => i.item_type === activeTypeFilter);
            if (q) list = list.filter(i => i.title.toLowerCase().includes(q) || (i.isbn && i.isbn.toLowerCase().includes(q)));
            renderItems(list);
        }

        function setTypeFilter(type, btn) {
            activeTypeFilter = type;
            document.querySelectorAll('.fpill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterItems();
        }

        /* ---- Modal ---- */
        function openModal(editMode = false) {
            document.getElementById('modalTitle').innerText = editMode ? 'Edit Item' : 'Add New Item';
            document.getElementById('addModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('addItemForm').reset();
            document.getElementById('editId').value = '';
        }

        function editItem(item) {
            document.getElementById('editId').value = item.id;
            document.getElementById('itemTitle').value = item.title;
            document.getElementById('itemType').value = item.item_type;
            document.getElementById('itemPrice').value = item.sell_price;
            document.getElementById('itemCost').value = item.purchase_price || 0;
            document.getElementById('itemStock').value = item.stock_qty;
            document.getElementById('itemBarcode').value = item.isbn || '';
            openModal(true);
        }

        async function handleSave(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveItem');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving…';
            btn.disabled = true;

            const editId = document.getElementById('editId').value;
            const payload = {
                id: editId || null,
                title: document.getElementById('itemTitle').value,
                item_type: document.getElementById('itemType').value,
                price: document.getElementById('itemPrice').value,
                cost: document.getElementById('itemCost').value,
                stock: document.getElementById('itemStock').value,
                barcode: document.getElementById('itemBarcode').value
            };
            const action = editId ? 'updateItem' : 'addItem';

            try {
                const res = await fetch(`../../api/controllers/InventoryController.php?action=${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    toast(editId ? 'Item updated!' : 'Item added!', 'success');
                    closeModal();
                    fetchInventory();
                } else {
                    toast('Error: ' + data.error, 'error');
                }
            } catch { toast('Connection error', 'error'); }
            finally {
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> SAVE ITEM';
                btn.disabled = false;
            }
        }

        async function deleteItem(id) {
            if (!confirm('Delete this item from inventory?')) return;
            try {
                const res = await fetch('../../api/controllers/InventoryController.php?action=deleteItem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.success) { toast('Item deleted', 'info'); fetchInventory(); }
                else toast('Error: ' + data.error, 'error');
            } catch { toast('Connection error', 'error'); }
        }

        /* ---- Restock ---- */
        function openRestock(id) {
            document.getElementById('restockId').value = id;
            document.getElementById('restockQty').value = 1;
            document.getElementById('restockModal').style.display = 'flex';
        }
        function closeRestock() { document.getElementById('restockModal').style.display = 'none'; }

        async function confirmRestock() {
            const id = document.getElementById('restockId').value;
            const qty = parseInt(document.getElementById('restockQty').value) || 1;
            try {
                const res = await fetch('../../api/controllers/InventoryController.php?action=restockItem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, qty })
                });
                const data = await res.json();
                if (data.success) { toast(`+${qty} units added!`, 'success'); closeRestock(); fetchInventory(); }
                else toast('Error: ' + data.error, 'error');
            } catch { toast('Connection error', 'error'); }
        }

        window.onload = function () {
            fetchInventory();
            // Background sync - refresh inventory every 15 seconds (silently)
            setInterval(() => fetchInventory(true), 15000);
        };
    </script>
</body>

</html>
